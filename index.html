<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    transition: background 1s ease;
    background: black;
}

/* ===== Floating Holi Powder ===== */
.powder {
    position: absolute;
    bottom: -20px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    opacity: 0.7;
    animation: rise linear infinite;
}

@keyframes rise {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0.8;
    }
    100% {
        transform: translateY(-110vh) scale(1.5);
        opacity: 0;
    }
}

/* ===== Animated Flowers ===== */
.corner {
    position: absolute;
    width: 120px;
    z-index: 0;
    animation: flowerFloat 4s ease-in-out infinite;
}

.top-left { top: 0; left: 0; }
.top-right { top: 0; right: 0; transform: scaleX(-1); }
.bottom-left { bottom: 0; left: 0; transform: scaleY(-1); }
.bottom-right { bottom: 0; right: 0; transform: scale(-1); }

@keyframes flowerFloat {
    0% { transform: rotate(0deg) translateY(0); }
    50% { transform: rotate(5deg) translateY(8px); }
    100% { transform: rotate(0deg) translateY(0); }
}

/* ===== Animated Pichkari ===== */
.pichkari {
    position: absolute;
    font-size: 55px;
    animation: sprayMove 2s ease-in-out infinite;
}

.left-gun {
    top: 25%;
    left: 5%;
}

.right-gun {
    bottom: 25%;
    right: 5%;
    transform: rotate(180deg);
}

@keyframes sprayMove {
    0% { transform: rotate(0deg) translateX(0); }
    50% { transform: rotate(-10deg) translateX(5px); }
    100% { transform: rotate(0deg) translateX(0); }
}

/* ===== Card ===== */
.card {
    position: relative;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    max-width: 90%;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    z-index: 2;
}

/* Border glow */
.card::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 28px;
    background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet, hotpink);
    background-size: 300% 300%;
    z-index: -1;
    animation: borderGlow 6s ease infinite;
}

@keyframes borderGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Text */
h1 {
    font-size: 26px;
    font-weight: bold;
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet, hotpink);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowText 6s ease infinite;
    text-shadow: 0 0 15px rgba(255,255,255,0.5);
}

@keyframes rainbowText {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: white;
    color: black;
    transition: transform 0.2s ease;
}

button:active {
    transform: scale(0.95);
}

/* Burst */
.burst {
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    opacity: 0.6;
    animation: explode 1.2s ease-out forwards;
}

@keyframes explode {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(4); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🌸 Flowers -->
<svg class="corner top-left" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="15" fill="yellow"/>
  <circle cx="50" cy="20" r="15" fill="pink"/>
  <circle cx="80" cy="50" r="15" fill="orange"/>
  <circle cx="50" cy="80" r="15" fill="red"/>
  <circle cx="20" cy="50" r="15" fill="violet"/>
</svg>
<svg class="corner top-right" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="15" fill="yellow"/>
  <circle cx="50" cy="20" r="15" fill="pink"/>
  <circle cx="80" cy="50" r="15" fill="orange"/>
  <circle cx="50" cy="80" r="15" fill="red"/>
  <circle cx="20" cy="50" r="15" fill="violet"/>
</svg>
<svg class="corner bottom-left" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="15" fill="yellow"/>
  <circle cx="50" cy="20" r="15" fill="pink"/>
  <circle cx="80" cy="50" r="15" fill="orange"/>
  <circle cx="50" cy="80" r="15" fill="red"/>
  <circle cx="20" cy="50" r="15" fill="violet"/>
</svg>
<svg class="corner bottom-right" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="15" fill="yellow"/>
  <circle cx="50" cy="20" r="15" fill="pink"/>
  <circle cx="80" cy="50" r="15" fill="orange"/>
  <circle cx="50" cy="80" r="15" fill="red"/>
  <circle cx="20" cy="50" r="15" fill="violet"/>
</svg>

<!-- 🔫 Pichkaris -->
<div class="pichkari left-gun">🔫</div>
<div class="pichkari right-gun">🔫</div>

<div class="card">
    <h1 id="message">
    hehe,my dear vanshika tap below cuz RAHHHH IT'S HOLI TEMMMM SHAWWWWW🎨
    </h1>
    <button id="actionBtn" onclick="nextPage()">Throw Colors</button>
</div>

<script>
let page = 1;

/* Continuous Holi Powder */
function createPowder() {
    setInterval(() => {
        let powder = document.createElement("div");
        powder.className = "powder";
        powder.style.left = Math.random() * 100 + "vw";
        powder.style.backgroundColor =
            "hsl(" + Math.random() * 360 + ", 100%, 60%)";
        powder.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(powder);
        setTimeout(() => powder.remove(), 6000);
    }, 200);
}
createPowder();

function colorBurst(amount = 8) {
    for (let i = 0; i < amount; i++) {
        let burst = document.createElement("div");
        burst.className = "burst";
        burst.style.backgroundColor =
            "hsl(" + Math.random() * 360 + ", 100%, 50%)";
        burst.style.left = Math.random() * window.innerWidth + "px";
        burst.style.top = Math.random() * window.innerHeight + "px";
        document.body.appendChild(burst);
        setTimeout(() => burst.remove(), 1200);
    }
}

function nextPage() {
    if (page === 1) {
        document.getElementById("message").innerHTML =
        "Happy Holi, My beloved vanshika<br>You make my life colorful every day.i hope this holi brings us loads of happiness and i look forward to spend my this year and rest of the years with you soooo hehe tap below for spreading more colours🤭";
        document.body.style.background =
        "linear-gradient(135deg, hotpink, orange, cyan, yellow, green)";
        colorBurst(12);
        page++;

    } else if (page === 2) {
        document.getElementById("message").innerHTML =
        "I'm so glad for your existence<br>and I'm really really glad i got to celebrate holi with you";
        document.body.style.background =
        "linear-gradient(135deg, purple, deeppink, orange)";
        colorBurst(18);
        page++;

    } else if (page === 3) {
        document.getElementById("message").innerHTML =
        "And I look forward to celebrate every Holi with you...<br>Today, next year, and all the years after that because you fill my day with colours like editors edit colours(i'll try my best to be better)❤️";
        document.body.style.background =
        "linear-gradient(135deg, red, orange, yellow, green, blue, indigo, violet)";
        colorBurst(30);
        document.getElementById("actionBtn").innerHTML = "Again? 😌";
        page = 1;
    }
}
</script>

</body>
</html>
